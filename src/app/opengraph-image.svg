<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#111827"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1f2937" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top glow -->
  <ellipse cx="600" cy="0" rx="600" ry="300" fill="url(#glow)"/>

  <!-- Zap icon -->
  <rect x="510" y="140" width="80" height="80" rx="20" fill="#00E5FF"/>
  <path d="M554 158L533 196h16l-6 36 21-38h-16l6-36z" fill="#0f172a" stroke="#0f172a" stroke-width="2" stroke-linejoin="round"/>

  <!-- Brand text -->
  <text x="608" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#ffffff" dominant-baseline="middle">Lynq</text>

  <!-- Divider -->
  <rect x="450" y="260" width="300" height="2" rx="1" fill="#00E5FF" opacity="0.4"/>

  <!-- Tagline -->
  <text x="600" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#94a3b8" text-anchor="middle">Employer Dashboard</text>

  <!-- Description -->
  <text x="600" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#64748b" text-anchor="middle">Manage jobs, candidates, campaigns, and analytics</text>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="#00E5FF"/>
</svg>
